<h1>CareBridge Dashboard</h1>

@if (patients$ | async; as patients) {
<p>Patients Overdue: <span style="color: #e11d48;">{{ patients.length }}</span></p>
  <ul>
    @for (p of patients; track p.id) {
      <li>{{ p.familyName }}, {{ p.givenName }}</li>
    }
  </ul>
} @else {
  <p>Loading clinical records from API...</p>
}
